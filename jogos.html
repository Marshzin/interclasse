<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos - Interclasse</title>

  <link rel="stylesheet" href="css/templatemo-crypto-style.css">
  <link rel="stylesheet" href="css/templatemo-crypto-pages.css">

  <style>
    .sidebar .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }

    .custom-active-link {
      background: linear-gradient(135deg, #b87333, #d49457);
      color: #fff;
    }

    .card {
      margin-bottom: 22px;
    }

    .section-title {
      margin: 0 0 8px;
      color: #fff;
      font-size: 22px;
    }

    .section-subtitle {
      margin: 0 0 18px;
      color: rgba(255,255,255,0.70);
      line-height: 1.6;
    }

    .empty-box {
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 26px;
      color: rgba(255,255,255,0.65);
      text-align: center;
      margin-top: 16px;
    }

    .modalities-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .modality-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: #f2c18d;
      background: rgba(184,115,51,0.14);
      border: 1px solid rgba(184,115,51,0.30);
      transition: 0.25s ease;
    }

    .modality-btn:hover {
      transform: translateY(-1px);
      background: rgba(184,115,51,0.24);
    }

    .games-group {
      margin-top: 28px;
      scroll-margin-top: 24px;
    }

    .games-title {
      margin: 0 0 14px;
      color: #f2c18d;
      font-size: 22px;
    }

    .matches-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 10px;
    }

    .match-box,
    .event-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
    }

    .match-meta,
    .status-tag {
      display: inline-block;
      margin-bottom: 10px;
      margin-right: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .match-meta {
      background: rgba(184,115,51,0.18);
      color: #f2c18d;
    }

    .status-nao-iniciado {
      background: rgba(255,255,255,0.10);
      color: #d9d9d9;
    }

    .status-andamento {
      background: rgba(255, 193, 7, 0.16);
      color: #ffd96a;
    }

    .status-intervalo {
      background: rgba(90, 160, 255, 0.16);
      color: #9cc4ff;
    }

    .status-finalizado {
      background: rgba(40, 167, 69, 0.18);
      color: #8df0a6;
    }

    .match-box h3 {
      margin: 6px 0 10px;
      color: #fff;
      font-size: 20px;
    }

    .match-box p,
    .event-box p {
      color: rgba(255,255,255,0.82);
      margin: 7px 0;
      line-height: 1.6;
    }

    .score-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 14px 0;
      font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 14px;
    }

    .team-name {
      flex: 1;
      text-align: center;
    }

    .score-center {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
    }

    .score-badge {
      min-width: 42px;
      text-align: center;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .events-toggle-btn {
      border: none;
      border-radius: 14px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
      background: rgba(184,115,51,0.18);
      color: #f2c18d;
      border: 1px solid rgba(184,115,51,0.35);
      margin-top: 10px;
    }

    .events-toggle-btn:hover {
      background: rgba(184,115,51,0.28);
    }

    .events-panel {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .events-panel.show {
      display: block;
    }

    .event-list {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .event-tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tag-goal {
      background: rgba(40, 167, 69, 0.18);
      color: #8df0a6;
    }

    .tag-yellow {
      background: rgba(255, 193, 7, 0.16);
      color: #ffd96a;
    }

    .tag-red {
      background: rgba(220, 53, 69, 0.18);
      color: #ffb3bc;
    }
  </style>
</head>
<body>

      <span></span>
      <span></span>

    </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard">
    <aside class="sidebar" id="sidebar">

        </div>

      </div>

      <nav class="nav-section">
        <div class="nav-label">Menu Principal</div>

        <a href="index.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
          </svg>
          Início
        </a>

        <a href="jogos.html" class="nav-item custom-active-link">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>

        </a>

        <a href="classificacao.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3v18h18"></path>
            <path d="M18 17V9"></path>
            <path d="M13 17V5"></path>
            <path d="M8 17v-3"></path>
          </svg>
          Classificação
        </a>

        <a href="times.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>

            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>

        <a href="administracao.html" class="nav-item">

      </nav>

    <main class="main-content">
      <div class="page-header">
        <h1>Jogos Oficiais - Atualizado</h1>
        <p>Visualize as datas de cada jogos por modalidade.</p>
      </div>

      <div class="card">
        <h2 class="section-title">Modalidades</h2>
        <div class="modalities-nav">
          <a href="#games-futsal" class="modality-btn">Futsal</a>
          <a href="#games-volei" class="modality-btn">Volei</a>
          <a href="#games-pingpong" class="modality-btn">Pingpong</a>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Partidas cadastradas</h2>
        <div id="gamesContainer"></div>
      </div>
    </main>
  </div>

  <script src="js/templatemo-crypto-script.js"></script>
  <script type="module">
    import { listenMatches } from "./firebase.js";

    const FIXED_SPORTS = ["Futsal", "Volei", "Pingpong"];

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDateBR(dateStr) {
      if (!dateStr) return "Não informada";
      const [year, month, day] = dateStr.split("-");
      if (!year || !month || !day) return dateStr;
      return `${day}/${month}/${year}`;
    }

    function createSafeId(text) {
      return "games-" + text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function toggleEvents(panelId, button) {
      const panel = document.getElementById(panelId);
      if (!panel) return;

      panel.classList.toggle("show");
      button.textContent = panel.classList.contains("show") ? "Ocultar eventos" : "Ver eventos";
    }
    window.toggleEvents = toggleEvents;

    function getStatusLabel(status) {
      if (status === "nao_iniciado") return "Não iniciado";
      if (status === "andamento") return "Em andamento";
      if (status === "intervalo") return "Intervalo";
      if (status === "finalizado") return "Finalizado";
      return "Não iniciado";
    }

    function getStatusClass(status) {
      if (status === "nao_iniciado") return "status-nao-iniciado";
      if (status === "andamento") return "status-andamento";
      if (status === "intervalo") return "status-intervalo";
      if (status === "finalizado") return "status-finalizado";
      return "status-nao-iniciado";
    }

    function renderEvents(events) {
      if (!events || !events.length) {
        return `<div class="empty-box">Nenhum evento registrado neste jogo.</div>`;
      }

      return `
        <div class="event-list">
          ${events.map(event => {
            let tagClass = "tag-goal";
            let tagLabel = "Gol";

            if (event.type === "yellow") {
              tagClass = "tag-yellow";
              tagLabel = "Cartão amarelo";
            } else if (event.type === "red") {
              tagClass = "tag-red";
              tagLabel = "Cartão vermelho";
            }

            return `
              <div class="event-box">
                <span class="event-tag ${tagClass}">${tagLabel}</span>
                <p><strong>Participante:</strong> ${escapeHtml(event.teamName)}</p>
                <p><strong>Jogador:</strong> ${event.playerNumber ? escapeHtml(event.playerNumber) + " - " : ""}${escapeHtml(event.playerName)}</p>
                <p><strong>Registro:</strong> ${escapeHtml(event.createdAt || "Não informado")}</p>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderGames(matches) {
      const container = document.getElementById("gamesContainer");

      let html = "";

      FIXED_SPORTS.forEach(sport => {
        const sectionId = createSafeId(sport);
        const matchesBySport = matches
          .filter(match => match.sport === sport)
          .sort((a, b) => {
            const dateTimeA = new Date(`${a.date || "9999-12-31"}T${a.time || "23:59"}`);
            const dateTimeB = new Date(`${b.date || "9999-12-31"}T${b.time || "23:59"}`);
            return dateTimeA - dateTimeB;
          });

        html += `
          <div class="games-group" id="${sectionId}">
            <h2 class="games-title">${escapeHtml(sport)}</h2>
        `;

        if (!matchesBySport.length) {
          html += `<div class="empty-box">Nenhum jogo marcado em ${escapeHtml(sport)}.</div>`;
        } else {
          html += `<div class="matches-grid">`;

          matchesBySport.forEach(match => {
            const panelId = `events-${match.id}`;

            html += `
              <div class="match-box">
                <div class="match-meta">${escapeHtml(match.sport)}</div>
                <div class="status-tag ${getStatusClass(match.status)}">${getStatusLabel(match.status)}</div>
                <h3>${escapeHtml(match.teamAName)} x ${escapeHtml(match.teamBName)}</h3>
                <p><strong>Data:</strong> ${formatDateBR(match.date)}</p>
                <p><strong>Horário de início:</strong> ${escapeHtml(match.time || "Não informado")}</p>

                <div class="score-line">
                  <div class="team-name">${escapeHtml(match.teamAName)}</div>
                  <div class="score-center">
                    <span class="score-badge">${Number(match.goalsA || 0)}</span>
                    <span>x</span>
                    <span class="score-badge">${Number(match.goalsB || 0)}</span>
                  </div>
                  <div class="team-name">${escapeHtml(match.teamBName)}</div>
                </div>

                <button class="events-toggle-btn" onclick="toggleEvents('${panelId}', this)">Ver eventos</button>

                <div class="events-panel" id="${panelId}">
                  ${renderEvents(match.events || [])}
                </div>
              </div>
            `;
          });

          html += `</div>`;
        }

        html += `</div>`;
      });

      container.innerHTML = html;
    }

    listenMatches((matches) => {
      renderGames(matches);
    });
  </script>
</body>
</html>
