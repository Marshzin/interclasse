<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos - Interclasse</title>

  <link rel="stylesheet" href="css/templatemo-crypto-style.css">
  <link rel="stylesheet" href="css/templatemo-crypto-pages.css">

  <style>
    .sidebar .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .match-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .match-box h3 {
      margin-bottom: 10px;
    }

    /* 🔥 PLACAR CORRIGIDO */
    .score-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 14px 0;
      font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 14px;
      flex-wrap: nowrap;
    }

    .team-name {
      white-space: nowrap;
    }

    .score-center {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 18px;
    }

    .score-badge {
      min-width: 36px;
      text-align: center;
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
    }

    /* 🔥 MOBILE */
    @media (max-width: 600px) {
      .score-line {
        gap: 6px;
        font-size: 14px;
      }

      .score-center {
        font-size: 16px;
      }

      .score-badge {
        min-width: 30px;
        padding: 5px 6px;
      }
    }
  </style>
</head>

<body>

<div class="dashboard">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <img src="logo.png" alt="Logo da Escola">
      </div>
      <span class="logo-text">INTERCLASSE WP - 2026</span>
    </div>
  </aside>

  <main class="main-content">
    <h1>Jogos Oficiais</h1>
    <div id="gamesContainer"></div>
  </main>
</div>

<script type="module">
import { listenMatches } from "./firebase.js";

function escapeHtml(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderGames(matches) {
  const container = document.getElementById("gamesContainer");

  container.innerHTML = matches.map(match => `
    <div class="match-box">

      <h3>${escapeHtml(match.teamAName)} x ${escapeHtml(match.teamBName)}</h3>

      <div class="score-line">
        <div class="team-name">${escapeHtml(match.teamAName)}</div>

        <div class="score-center">
          <span class="score-badge">${Number(match.goalsA || 0)}</span>
          <span>x</span>
          <span class="score-badge">${Number(match.goalsB || 0)}</span>
        </div>

        <div class="team-name">${escapeHtml(match.teamBName)}</div>
      </div>

    </div>
  `).join("");
}

listenMatches((matches) => {
  renderGames(matches);
});
</script>

</body>
</html>
