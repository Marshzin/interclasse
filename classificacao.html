<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificação - Interclasse</title>

  <link rel="stylesheet" href="css/templatemo-crypto-style.css">
  <link rel="stylesheet" href="css/templatemo-crypto-pages.css">

  <style>
    .sidebar .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }

    .custom-active-link {
      background: linear-gradient(135deg, #b87333, #d49457);
      color: #fff;
    }

    .card {
      margin-bottom: 24px;
    }

    .empty-box {
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 26px;
      color: rgba(255,255,255,0.65);
      text-align: center;
      margin-top: 16px;
    }

    .modalities-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .modality-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: #f2c18d;
      background: rgba(184,115,51,0.14);
      border: 1px solid rgba(184,115,51,0.30);
      transition: 0.25s ease;
    }

    .modality-btn:hover {
      transform: translateY(-1px);
      background: rgba(184,115,51,0.24);
    }

    .classification-group {
      margin-top: 28px;
      scroll-margin-top: 24px;
    }

    .classification-title {
      margin: 0 0 14px;
      color: #f2c18d;
      font-size: 22px;
    }

    .classification-table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .classification-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      overflow: hidden;
    }

    .classification-table th,
    .classification-table td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.88);
      text-align: left;
    }

    .classification-table th {
      color: #f2c18d;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.4px;
    }

    .classification-table tr:first-child td {
      color: #ffd27d;
      font-weight: 700;
    }

    .position-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(184,115,51,0.18);
      color: #f2c18d;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 280px !important;
        height: 100vh !important;
        z-index: 10001 !important;
        overflow-y: auto !important;
        background: #151821 !important;
        transform: translateX(-110%) !important;
        transition: transform 0.3s ease !important;
        display: block !important;
      }

      .sidebar.mobile-open {
        transform: translateX(0) !important;
      }

      .sidebar-overlay {
        position: fixed !important;
        inset: 0 !important;
        background: rgba(0, 0, 0, 0.45) !important;
        opacity: 0 !important;
        visibility: hidden !important;
        z-index: 10000 !important;
        transition: opacity 0.3s ease, visibility 0.3s ease !important;
      }

      .sidebar-overlay.show {
        opacity: 1 !important;
        visibility: visible !important;
      }

      .mobile-menu-toggle {
        position: fixed !important;
        top: 14px !important;
        left: 14px !important;
        z-index: 10002 !important;
        display: flex !important;
      }

      .main-content {
        width: 100% !important;
        padding-top: 76px !important;
        box-sizing: border-box;
      }

      .modalities-nav {
        flex-direction: column;
        align-items: stretch;
      }

      .modality-btn {
        width: 100%;
        text-align: center;
        justify-content: center;
      }

      .classification-table {
        min-width: 680px;
      }
    }

    @media (max-width: 600px) {
      .classification-table {
        min-width: 620px;
      }

      .logo-text {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button" onclick="toggleMobileMenu()">
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <img src="logo.png" alt="Logo da Escola">
        </div>
        <span class="logo-text">INTERCLASSE WP - 2026</span>
      </div>

      <nav class="nav-section">
        <div class="nav-label">Menu Principal</div>

        <a href="index.html" class="nav-item">Início</a>
        <a href="jogos.html" class="nav-item">Jogos</a>
        <a href="classificacao.html" class="nav-item custom-active-link">Classificação</a>
        <a href="times.html" class="nav-item">Times</a>
        <a href="administracao.html" class="nav-item">Administração</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Classificação</h1>
        <p>Confira a classificação separada por modalidade e categoria.</p>
      </div>

      <div class="card">
        <h2 style="margin:0 0 10px; color:#fff; font-size:22px;">Modalidades</h2>
        <div class="modalities-nav">
          <a href="#mod-futsal-fundamental" class="modality-btn">Futsal - Fundamental</a>
          <a href="#mod-futsal-medio" class="modality-btn">Futsal - Médio</a>
          <a href="#mod-volei" class="modality-btn">Vôlei</a>
        </div>
      </div>

      <div class="card">
        <div id="classificationContainer"></div>
      </div>
    </main>
  </div>

  <script src="js/templatemo-crypto-script.js"></script>

  <script type="module">
    import { listenTeams, listenMatches } from "./firebase.js";

    const GROUPS = [
      {
        key: "Futsal-Fundamental",
        sport: "Futsal",
        category: "Fundamental",
        title: "Futsal - Ensino Fundamental"
      },
      {
        key: "Futsal-Medio",
        sport: "Futsal",
        category: "Medio",
        title: "Futsal - Ensino Médio"
      },
      {
        key: "Volei",
        sport: "Volei",
        category: null,
        title: "Vôlei"
      }
    ];

    let teamsCache = [];
    let matchesCache = [];

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function cleanName(text) {
      return String(text || "")
        .replace(/\n/g, " ")
        .replace(/\r/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function createSafeId(text) {
      return "mod-" + text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function normalizeCategory(category) {
      const value = cleanName(category).toLowerCase();

      if (
        value === "fundamental" ||
        value === "ensino fundamental" ||
        value === "ef"
      ) {
        return "Fundamental";
      }

      if (
        value === "medio" ||
        value === "médio" ||
        value === "ensino medio" ||
        value === "ensino médio" ||
        value === "em"
      ) {
        return "Medio";
      }

      return "";
    }

    function buildDisplayName(team) {
      return cleanName(team.teamName) || "Equipe";
    }

    function getTeamCategory(team) {
      return (
        team.category ||
        team.categoria ||
        team.level ||
        team.ensino ||
        ""
      );
    }

    function getMatchCategory(match) {
      return (
        match.category ||
        match.categoria ||
        match.level ||
        match.ensino ||
        ""
      );
    }

    function getGroupKey(sport, category, teamName = "") {
      if (sport === "Futsal") {
        const normalizedCategory = normalizeCategory(category);
        const name = cleanName(teamName).toLowerCase();

        if (normalizedCategory === "Fundamental") {
          return "Futsal-Fundamental";
        }

        if (normalizedCategory === "Medio") {
          return "Futsal-Medio";
        }

        if (
          name.includes("1 ano") ||
          name.includes("1º ano") ||
          name.includes("1ª série") ||
          name.includes("1 serie") ||
          name.includes("1ª serie") ||
          name.includes("2 ano") ||
          name.includes("2º ano") ||
          name.includes("2ª série") ||
          name.includes("2 serie") ||
          name.includes("2ª serie") ||
          name.includes("3 ano") ||
          name.includes("3º ano") ||
          name.includes("3ª série") ||
          name.includes("3 serie") ||
          name.includes("3ª serie")
        ) {
          return "Futsal-Medio";
        }

        if (
          name.includes("6 ano") ||
          name.includes("6º ano") ||
          name.includes("7 ano") ||
          name.includes("7º ano") ||
          name.includes("8 ano") ||
          name.includes("8º ano") ||
          name.includes("9 ano") ||
          name.includes("9º ano")
        ) {
          return "Futsal-Fundamental";
        }

        return "Futsal-Fundamental";
      }

      if (sport === "Volei") {
        return "Volei";
      }

      return null;
    }

    function buildClassificationData() {
      const classification = {};

      GROUPS.forEach(group => {
        classification[group.key] = [];
      });

      teamsCache.forEach(team => {
        const groupKey = getGroupKey(
          team.sport,
          getTeamCategory(team),
          team.teamName
        );

        if (!groupKey) return;

        if (!classification[groupKey]) {
          classification[groupKey] = [];
        }

        classification[groupKey].push({
          teamName: buildDisplayName(team),
          captain: cleanName(team.captain) || "",
          points: 0,
          wins: 0,
          games: 0,
          goalsFor: 0,
          goalsAgainst: 0,
          goalDifference: 0
        });
      });

      matchesCache
        .filter(match => match.status === "finalizado")
        .forEach(match => {
          const groupKey = getGroupKey(
            match.sport,
            getMatchCategory(match),
            match.teamAName
          );

          if (!groupKey) return;
          if (!classification[groupKey]) return;

          const teamAName = cleanName(match.teamAName);
          const teamBName = cleanName(match.teamBName);

          const teamA = classification[groupKey].find(item => item.teamName === teamAName);
          const teamB = classification[groupKey].find(item => item.teamName === teamBName);

          if (!teamA || !teamB) return;

          const goalsA = Number(match.goalsA) || 0;
          const goalsB = Number(match.goalsB) || 0;

          teamA.games += 1;
          teamB.games += 1;

          teamA.goalsFor += goalsA;
          teamA.goalsAgainst += goalsB;

          teamB.goalsFor += goalsB;
          teamB.goalsAgainst += goalsA;

          if (match.sport === "Futsal") {
            if (goalsA > goalsB) {
              teamA.points += 3;
              teamA.wins += 1;
            } else if (goalsB > goalsA) {
              teamB.points += 3;
              teamB.wins += 1;
            } else {
              teamA.points += 1;
              teamB.points += 1;
            }
          } else if (match.sport === "Volei") {
            if (goalsA > goalsB) {
              teamA.points += 1;
              teamA.wins += 1;
            } else if (goalsB > goalsA) {
              teamB.points += 1;
              teamB.wins += 1;
            }
          }
        });

      Object.keys(classification).forEach(groupKey => {
        classification[groupKey].forEach(team => {
          team.goalDifference = team.goalsFor - team.goalsAgainst;
        });

        classification[groupKey].sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          if (b.wins !== a.wins) return b.wins - a.wins;
          if (b.goalDifference !== a.goalDifference) return b.goalDifference - a.goalDifference;
          if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;

          return a.teamName.localeCompare(b.teamName, "pt-BR");
        });
      });

      return classification;
    }

    function renderClassification() {
      const container = document.getElementById("classificationContainer");
      const classification = buildClassificationData();

      let html = "";

      GROUPS.forEach(group => {
        const teams = classification[group.key] || [];
        const sectionId = createSafeId(group.key);

        html += `
          <div class="classification-group" id="${sectionId}">
            <h2 class="classification-title">${escapeHtml(group.title)}</h2>
        `;

        if (!teams.length) {
          html += `
            <div class="empty-box">
              Nenhuma equipe cadastrada em ${escapeHtml(group.title)}.
            </div>
          `;
        } else {
          html += `
            <div class="classification-table-wrapper">
              <table class="classification-table">
                <thead>
                  <tr>
                    <th>Posição</th>
                    <th>Time</th>

                    ${
                      group.sport === "Futsal"
                        ? "<th>Capitão</th>"
                        : ""
                    }

                    ${
                      group.sport === "Volei"
                        ? `
                          <th>Jogos</th>
                          <th>Vitórias</th>
                          <th>Pontos</th>
                        `
                        : `
                          <th>Jogos</th>
                          <th>Vitórias</th>
                          <th>GP</th>
                          <th>GC</th>
                          <th>SG</th>
                          <th>Pontos</th>
                        `
                    }
                  </tr>
                </thead>
                <tbody>
          `;

          teams.forEach((team, index) => {
            html += `
              <tr>
                <td><span class="position-badge">${index + 1}</span></td>
                <td>${escapeHtml(team.teamName)}</td>

                ${
                  group.sport === "Futsal"
                    ? `<td>${escapeHtml(team.captain || "-")}</td>`
                    : ""
                }

                ${
                  group.sport === "Volei"
                    ? `
                      <td>${team.games}</td>
                      <td>${team.wins}</td>
                      <td>${team.points}</td>
                    `
                    : `
                      <td>${team.games}</td>
                      <td>${team.wins}</td>
                      <td>${team.goalsFor}</td>
                      <td>${team.goalsAgainst}</td>
                      <td>${team.goalDifference}</td>
                      <td>${team.points}</td>
                    `
                }
              </tr>
            `;
          });

          html += `
                </tbody>
              </table>
            </div>
          `;
        }

        html += `</div>`;
      });

      container.innerHTML = html;
    }

    function atualizarTudo() {
      renderClassification();
    }

    listenTeams((teams) => {
      teamsCache = [...teams];
      atualizarTudo();
    });

    listenMatches((matches) => {
      matchesCache = [...matches];
      atualizarTudo();
    });
  </script>

  <script>
    function toggleMobileMenu() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");

      if (!sidebar || !overlay) return;

      sidebar.classList.toggle("mobile-open");
      overlay.classList.toggle("show");
    }

    document.addEventListener("DOMContentLoaded", function () {
      const overlay = document.getElementById("sidebarOverlay");
      const sidebar = document.getElementById("sidebar");

      if (overlay && sidebar) {
        overlay.addEventListener("click", function () {
          sidebar.classList.remove("mobile-open");
          overlay.classList.remove("show");
        });
      }

      document.querySelectorAll(".sidebar .nav-item").forEach(item => {
        item.addEventListener("click", function () {
          if (sidebar && overlay) {
            sidebar.classList.remove("mobile-open");
            overlay.classList.remove("show");
          }
        });
      });

      window.addEventListener("resize", function () {
        if (window.innerWidth > 900 && sidebar && overlay) {
          sidebar.classList.remove("mobile-open");
          overlay.classList.remove("show");
        }
      });
    });
  </script>
</body>
</html>
