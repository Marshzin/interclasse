  <style>
    .sidebar .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }

    .custom-active-link {
      background: linear-gradient(135deg, #b87333, #d49457);
      color: #fff;
    }

    .card {
      margin-bottom: 24px;
    }

    .empty-box {
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 26px;
      color: rgba(255,255,255,0.65);
      text-align: center;
      margin-top: 16px;
    }

    .modalities-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .modality-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: #f2c18d;
      background: rgba(184,115,51,0.14);
      border: 1px solid rgba(184,115,51,0.30);
      transition: 0.25s ease;
    }

    .modality-btn:hover {
      transform: translateY(-1px);
      background: rgba(184,115,51,0.24);
    }

    .classification-group {
      margin-top: 28px;
      scroll-margin-top: 24px;
    }

    .classification-title {
      margin: 0 0 14px;
      color: #f2c18d;
      font-size: 22px;
    }

    .classification-table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .classification-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      overflow: hidden;
    }

    .classification-table th,
    .classification-table td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.88);
      text-align: left;
    }

    .classification-table th {
      color: #f2c18d;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.4px;
    }

    .classification-table tr:first-child td {
      color: #ffd27d;
      font-weight: 700;
    }

    .position-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(184,115,51,0.18);
      color: #f2c18d;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 280px !important;
        height: 100vh !important;
        z-index: 10001 !important;
        overflow-y: auto !important;
        background: #151821 !important;
        transform: translateX(-110%) !important;
        transition: transform 0.3s ease !important;
        will-change: transform;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
      }

      .sidebar.mobile-open {
        transform: translateX(0) !important;
      }

      .sidebar-overlay {
        position: fixed !important;
        inset: 0 !important;
        background: rgba(0, 0, 0, 0.45) !important;
        opacity: 0 !important;
        visibility: hidden !important;
        z-index: 10000 !important;
        transition: opacity 0.3s ease, visibility 0.3s ease !important;
        display: block !important;
      }

      .sidebar-overlay.show {
        opacity: 1 !important;
        visibility: visible !important;
      }

      .mobile-menu-toggle {
        position: fixed !important;
        top: 14px !important;
        left: 14px !important;
        z-index: 10002 !important;
        display: flex !important;
      }

      .main-content {
        width: 100% !important;
        padding-top: 76px !important;
        box-sizing: border-box;
      }

      .modalities-nav {
        flex-direction: column;
        align-items: stretch;
      }

      .modality-btn {
        width: 100%;
        text-align: center;
        justify-content: center;
      }

      .classification-table {
        min-width: 680px;
      }
    }

    @media (max-width: 600px) {
      .classification-table {
        min-width: 620px;
      }

      .logo-text {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button" onclick="toggleMobileMenu()">
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <img src="logo.png" alt="Logo da Escola">
        </div>
        <span class="logo-text">INTERCLASSE WP - 2026</span>
      </div>

      <nav class="nav-section">
        <div class="nav-label">Menu Principal</div>

        <a href="index.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
          </svg>
          Início
        </a>

        <a href="jogos.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          Jogos
        </a>

        <a href="classificacao.html" class="nav-item custom-active-link">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3v18h18"></path>
            <path d="M18 17V9"></path>
            <path d="M13 17V5"></path>
            <path d="M8 17v-3"></path>
          </svg>
          Classificação
        </a>

        <a href="times.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Times
        </a>

        <a href="administracao.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z"></path>
          </svg>
          Administração
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Classificação</h1>
        <p>Confira a classificação separada por modalidade.</p>
      </div>

      <div class="card">
        <h2 style="margin:0 0 10px; color:#fff; font-size:22px;">Modalidades</h2>
        <div class="modalities-nav">
          <a href="#mod-futsal" class="modality-btn">Futsal</a>
          <a href="#mod-volei" class="modality-btn">Vôlei</a>
          <a href="#mod-pingpong" class="modality-btn">Pingpong</a>
        </div>
      </div>

      <div class="card">
        <div id="classificationContainer"></div>
      </div>
    </main>
  </div>

  <script src="js/templatemo-crypto-script.js"></script>

  <script type="module">
    import { listenTeams, listenMatches } from "./firebase.js";

    const FIXED_SPORTS = ["Futsal", "Volei", "Pingpong"];

    let teamsCache = [];
    let matchesCache = [];

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function createSafeId(text) {
      return "mod-" + text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function cleanName(text) {
      return String(text || "")
        .replace(/\n/g, " ")
        .replace(/\r/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildDisplayName(team) {
      if (team.sport === "Pingpong") {
        const first = team.players && team.players[0] ? team.players[0] : null;

        if (first && first.name) {
          return cleanName(first.name);
        }

        return cleanName(team.teamName) || "Jogador";
      }

      return cleanName(team.teamName) || "Equipe";
    }

    function normalizeMatchName(name) {
      return cleanName(name);
    }

    function buildClassificationData() {
      const classification = {};

      FIXED_SPORTS.forEach(sport => {
        classification[sport] = [];
      });

      teamsCache.forEach(team => {
        if (!classification[team.sport]) {
          classification[team.sport] = [];
        }

        classification[team.sport].push({
          teamName: buildDisplayName(team),
          captain: cleanName(team.captain) || "",
          points: 0,
          wins: 0,
          games: 0,
          goalsFor: 0,
          goalsAgainst: 0,
          goalDifference: 0
        });
      });

      matchesCache
        .filter(match => match.status === "finalizado")
        .forEach(match => {
          const sport = match.sport;

          if (!classification[sport]) return;

          const teamAName = normalizeMatchName(match.teamAName);
          const teamBName = normalizeMatchName(match.teamBName);

          const teamA = classification[sport].find(item => item.teamName === teamAName);
          const teamB = classification[sport].find(item => item.teamName === teamBName);

          if (!teamA || !teamB) return;

          const goalsA = Number(match.goalsA) || 0;
          const goalsB = Number(match.goalsB) || 0;

          teamA.games += 1;
          teamB.games += 1;

          teamA.goalsFor += goalsA;
          teamA.goalsAgainst += goalsB;

          teamB.goalsFor += goalsB;
          teamB.goalsAgainst += goalsA;

          if (goalsA > goalsB) {
            teamA.points += 1;
            teamA.wins += 1;
          } else if (goalsB > goalsA) {
            teamB.points += 1;
            teamB.wins += 1;
          }
        });

      Object.keys(classification).forEach(sport => {
        classification[sport].forEach(team => {
          team.goalDifference = team.goalsFor - team.goalsAgainst;
        });

        classification[sport].sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          if (b.wins !== a.wins) return b.wins - a.wins;
          if (b.goalDifference !== a.goalDifference) return b.goalDifference - a.goalDifference;
          if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;

          return a.teamName.localeCompare(b.teamName, "pt-BR");
        });
      });

      return classification;
    }

    function renderClassification() {
      const container = document.getElementById("classificationContainer");
      const classification = buildClassificationData();

      let html = "";

      FIXED_SPORTS.forEach(sport => {
        const sectionId = createSafeId(sport);
        const teams = classification[sport] || [];

        html += `
          <div class="classification-group" id="${sectionId}">
            <h2 class="classification-title">${escapeHtml(sport)}</h2>
        `;

        if (!teams.length) {
          html += `<div class="empty-box">Nenhuma equipe/participante cadastrada em ${escapeHtml(sport)}.</div>`;
        } else {
          html += `
            <div class="classification-table-wrapper">
              <table class="classification-table">
                <thead>
                  <tr>
                    <th>Posição</th>
                    <th>${sport === "Pingpong" ? "Jogador" : "Time"}</th>

                    ${
                      sport === "Futsal"
                        ? "<th>Capitão</th>"
                        : ""
                    }

                    <th>Jogos</th>
                    <th>Vitórias</th>
                    <th>GP</th>
                    <th>GC</th>
                    <th>SG</th>
                    <th>Pontos</th>
                  </tr>
                </thead>
                <tbody>
          `;

          teams.forEach((team, index) => {
            html += `
              <tr>
                <td><span class="position-badge">${index + 1}</span></td>
                <td>${escapeHtml(team.teamName)}</td>

                ${
                  sport === "Futsal" || sport === "Pingpong"
                    ? `<td>${escapeHtml(team.captain || "-")}</td>`
                    : ""
                }

                <td>${team.games}</td>
                <td>${team.wins}</td>
                <td>${team.goalsFor}</td>
                <td>${team.goalsAgainst}</td>
                <td>${team.goalDifference}</td>
                <td>${team.points}</td>
              </tr>
            `;
          });

          html += `
                </tbody>
              </table>
            </div>
          `;
        }

        html += `</div>`;
      });

      container.innerHTML = html;
    }

    function atualizarTudo() {
      renderClassification();
    }

    listenTeams((teams) => {
      teamsCache = [...teams];
      atualizarTudo();
    });

    listenMatches((matches) => {
      matchesCache = [...matches];
      atualizarTudo();
    });
  </script>

  <script>
    function toggleMobileMenu() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");

      if (!sidebar || !overlay) return;

      sidebar.classList.toggle("mobile-open");
      overlay.classList.toggle("show");
    }

    document.addEventListener("DOMContentLoaded", function () {
      const overlay = document.getElementById("sidebarOverlay");
      const sidebar = document.getElementById("sidebar");

      if (overlay && sidebar) {
        overlay.addEventListener("click", function () {
          sidebar.classList.remove("mobile-open");
          overlay.classList.remove("show");
        });
      }

      document.querySelectorAll(".sidebar .nav-item").forEach(item => {
        item.addEventListener("click", function () {
          if (sidebar && overlay) {
            sidebar.classList.remove("mobile-open");
            overlay.classList.remove("show");
          }
        });
      });

      window.addEventListener("resize", function () {
        if (window.innerWidth > 900 && sidebar && overlay) {
          sidebar.classList.remove("mobile-open");
          overlay.classList.remove("show");
        }
      });
    });
  </script>
</body>
</html>
