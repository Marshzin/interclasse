<script type="module">
  import { listenTeams, listenMatches } from "./firebase.js";

  // =========================
  // MODALIDADES FIXAS
  // =========================
  const FIXED_SPORTS = [
    "Futsal",
    "Volei",
    "Pingpong"
  ];

  let teamsCache = [];
  let matchesCache = [];

  // =========================
  // ESCAPAR HTML
  // =========================
  function escapeHtml(text) {
    return String(text ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // =========================
  // CRIAR ID SEGURO
  // =========================
  function createSafeId(text) {
    return "mod-" + text
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  // =========================
  // NOME DOS TIMES/JOGADORES
  // =========================
  function buildDisplayName(team) {

    // Pingpong mostra o nome do jogador
    if (team.sport === "Pingpong") {

      const first =
        team.players &&
        team.players[0]
          ? team.players[0]
          : null;

      return first
        ? first.name
            .replace(/\n/g, " ")
            .replace(/\s+/g, " ")
            .trim()
        : "Jogador";
    }

    // Futsal e Vôlei
    return (team.teamName || "Equipe")
      .replace(/\n/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  // =========================
  // DADOS CLASSIFICAÇÃO
  // =========================
  function buildClassificationData() {

    const classification = {};

    FIXED_SPORTS.forEach(sport => {
      classification[sport] = [];
    });

    // =========================
    // ADICIONAR TIMES
    // =========================
    teamsCache.forEach(team => {

      if (!classification[team.sport]) {
        classification[team.sport] = [];
      }

      classification[team.sport].push({
        teamName: buildDisplayName(team),
        captain: team.captain || "",
        points: 0,
        wins: 0,
        games: 0,
        goalsFor: 0,
        goalsAgainst: 0,
        goalDifference: 0
      });
    });

    // =========================
    // PROCESSAR JOGOS
    // =========================
    matchesCache
      .filter(match =>
        match.status === "finalizado"
      )
      .forEach(match => {

        const sport = match.sport;

        if (!classification[sport]) return;

        const teamA =
          classification[sport]
            .find(item =>
              item.teamName ===
              match.teamAName
            );

        const teamB =
          classification[sport]
            .find(item =>
              item.teamName ===
              match.teamBName
            );

        if (!teamA || !teamB) return;

        const goalsA =
          Number(match.goalsA) || 0;

        const goalsB =
          Number(match.goalsB) || 0;

        // Jogos
        teamA.games += 1;
        teamB.games += 1;

        // Gols pró/contra
        teamA.goalsFor += goalsA;
        teamA.goalsAgainst += goalsB;

        teamB.goalsFor += goalsB;
        teamB.goalsAgainst += goalsA;

        // Vitória
        if (goalsA > goalsB) {

          teamA.points += 1;
          teamA.wins += 1;

        } else if (goalsB > goalsA) {

          teamB.points += 1;
          teamB.wins += 1;
        }
      });

    // =========================
    // CALCULAR SALDO
    // =========================
    Object.keys(classification)
      .forEach(sport => {

        classification[sport]
          .forEach(team => {

            team.goalDifference =
              team.goalsFor -
              team.goalsAgainst;
          });

        // =========================
        // ORDENAR TABELA
        // =========================
        classification[sport]
          .sort((a, b) => {

            // Pontos
            if (b.points !== a.points) {
              return b.points - a.points;
            }

            // Vitórias
            if (b.wins !== a.wins) {
              return b.wins - a.wins;
            }

            // Saldo
            if (
              b.goalDifference !==
              a.goalDifference
            ) {
              return (
                b.goalDifference -
                a.goalDifference
              );
            }

            // Gols pró
            if (
              b.goalsFor !==
              a.goalsFor
            ) {
              return (
                b.goalsFor -
                a.goalsFor
              );
            }

            // Nome
            return a.teamName.localeCompare(
              b.teamName,
              "pt-BR"
            );
          });
      });

    return classification;
  }

  // =========================
  // RENDERIZAR CLASSIFICAÇÃO
  // =========================
  function renderClassification() {

    const container =
      document.getElementById(
        "classificationContainer"
      );

    const classification =
      buildClassificationData();

    let html = "";

    FIXED_SPORTS.forEach(sport => {

      const sectionId =
        createSafeId(sport);

      const teams =
        classification[sport] || [];

      html += `
        <div
          class="classification-group"
          id="${sectionId}"
        >

          <h2 class="classification-title">
            ${escapeHtml(sport)}
          </h2>
      `;

      // =========================
      // SEM TIMES
      // =========================
      if (!teams.length) {

        html += `
          <div class="empty-box">
            Nenhuma equipe/participante
            cadastrada em
            ${escapeHtml(sport)}.
          </div>
        `;

      } else {

        // =========================
        // TABELA
        // =========================
        html += `
          <div class="classification-table-wrapper">

            <table class="classification-table">

              <thead>
                <tr>

                  <th>Posição</th>

                  <th>
                    ${
                      sport === "Pingpong"
                        ? "Jogador"
                        : "Time"
                    }
                  </th>

                  ${
                    sport === "Futsal" ||
                    sport === "Pingpong"
                      ? "<th>Capitão</th>"
                      : ""
                  }

                  <th>Jogos</th>
                  <th>Vitórias</th>
                  <th>GP</th>
                  <th>GC</th>
                  <th>SG</th>
                  <th>Pontos</th>

                </tr>
              </thead>

              <tbody>
        `;

        // =========================
        // LINHAS
        // =========================
        teams.forEach((team, index) => {

          html += `
            <tr>

              <td>
                <span class="position-badge">
                  ${index + 1}
                </span>
              </td>

              <td>
                ${escapeHtml(team.teamName)}
              </td>

              ${
                sport === "Futsal" ||
                sport === "Pingpong"

                  ? `
                    <td>
                      ${
                        escapeHtml(
                          team.captain || "-"
                        )
                      }
                    </td>
                  `
                  : ""
              }

              <td>${team.games}</td>
              <td>${team.wins}</td>
              <td>${team.goalsFor}</td>
              <td>${team.goalsAgainst}</td>
              <td>${team.goalDifference}</td>
              <td>${team.points}</td>

            </tr>
          `;
        });

        html += `
              </tbody>

            </table>

          </div>
        `;
      }

      html += `
        </div>
      `;
    });

    container.innerHTML = html;
  }

  // =========================
  // ATUALIZAR
  // =========================
  function atualizarTudo() {
    renderClassification();
  }

  // =========================
  // OUVIR TIMES
  // =========================
  listenTeams((teams) => {

    teamsCache = [...teams];

    atualizarTudo();
  });

  // =========================
  // OUVIR JOGOS
  // =========================
  listenMatches((matches) => {

    matchesCache = [...matches];

    atualizarTudo();
  });
</script>
