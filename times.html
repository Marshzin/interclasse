<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Times - Interclasse</title>

  <link rel="stylesheet" href="css/templatemo-crypto-style.css">
  <link rel="stylesheet" href="css/templatemo-crypto-pages.css">

  <style>
    .sidebar .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
    }

    .custom-active-link {
      background: linear-gradient(135deg, #b87333, #d49457);
      color: #fff;
    }

    .card {
      margin-bottom: 22px;
    }

    .section-title {
      margin: 0 0 8px;
      color: #fff;
      font-size: 22px;
    }

    .modalities-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      margin-bottom: 8px;
    }

    .modality-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: #f2c18d;
      background: rgba(184,115,51,0.14);
      border: 1px solid rgba(184,115,51,0.30);
      transition: 0.25s ease;
    }

    .modality-btn:hover {
      transform: translateY(-1px);
      background: rgba(184,115,51,0.24);
    }

    .teams-group {
      margin-top: 28px;
      scroll-margin-top: 24px;
    }

    .teams-group-title {
      margin: 0 0 14px;
      color: #f2c18d;
      font-size: 22px;
    }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
      margin-top: 16px;
    }

    .team-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
    }

    .team-box h3 {
      margin: 0 0 10px;
      color: #fff;
      font-size: 20px;
    }

    .team-meta {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(184,115,51,0.18);
      color: #f2c18d;
      font-size: 12px;
      font-weight: 700;
    }

    .team-box p {
      color: rgba(255,255,255,0.82);
      margin: 7px 0;
      line-height: 1.6;
    }

    .team-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn-custom {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .players-btn {
      background: rgba(184,115,51,0.18);
      color: #f2c18d;
      border: 1px solid rgba(184,115,51,0.35);
    }

    .players-btn:hover {
      background: rgba(184,115,51,0.28);
    }

    .players-panel {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .players-panel.show {
      display: block;
    }

    .players-panel ul {
      margin: 0;
      padding-left: 18px;
      color: rgba(255,255,255,0.82);
      line-height: 1.8;
    }

    .empty-box {
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 26px;
      color: rgba(255,255,255,0.65);
      text-align: center;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 280px !important;
        height: 100vh !important;
        z-index: 10001 !important;
        overflow-y: auto !important;
        background: #151821 !important;
        transform: translateX(-110%) !important;
        transition: transform 0.3s ease !important;
        display: block !important;
      }

      .sidebar.mobile-open {
        transform: translateX(0) !important;
      }

      .sidebar-overlay {
        position: fixed !important;
        inset: 0 !important;
        background: rgba(0, 0, 0, 0.45) !important;
        opacity: 0 !important;
        visibility: hidden !important;
        z-index: 10000 !important;
        transition: opacity 0.3s ease, visibility 0.3s ease !important;
        display: block !important;
      }

      .sidebar-overlay.show {
        opacity: 1 !important;
        visibility: visible !important;
      }

      .mobile-menu-toggle {
        position: fixed !important;
        top: 14px !important;
        left: 14px !important;
        z-index: 10002 !important;
        display: flex !important;
      }

      .main-content {
        width: 100% !important;
        padding-top: 76px !important;
        box-sizing: border-box;
      }

      .modalities-nav,
      .team-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .modality-btn,
      .btn-custom {
        width: 100%;
        text-align: center;
        justify-content: center;
      }

      .teams-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button" onclick="toggleMobileMenu()">
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <img src="logo.png" alt="Logo da Escola">
        </div>
        <span class="logo-text">INTERCLASSE WP - 2026</span>
      </div>

      <nav class="nav-section">
        <div class="nav-label">Menu Principal</div>

        <a href="index.html" class="nav-item">Início</a>
        <a href="jogos.html" class="nav-item">Jogos</a>
        <a href="classificacao.html" class="nav-item">Classificação</a>
        <a href="times.html" class="nav-item custom-active-link">Times</a>
        <a href="administracao.html" class="nav-item">Administração</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Times</h1>
        <p>Visualize as equipes e participantes por modalidade.</p>
      </div>

      <div class="card">
        <h2 class="section-title">Modalidades</h2>

        <div class="modalities-nav">
          <a href="#mod-futsal-ensino-medio" class="modality-btn">Futsal - Ensino Médio</a>
          <a href="#mod-futsal-ensino-fundamental" class="modality-btn">Futsal - Ensino Fundamental</a>
          <a href="#mod-volei" class="modality-btn">Vôlei</a>
        </div>

        <div id="teamsContainer"></div>
      </div>
    </main>
  </div>

  <script src="js/templatemo-crypto-script.js"></script>

  <script type="module">
    import { listenTeams } from "./firebase.js";

    const FIXED_SPORTS = [
      "Futsal - Ensino Medio",
      "Futsal - Ensino Fundamental",
      "Volei"
    ];

    const teamsContainer = document.getElementById("teamsContainer");

    function normalizeText(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function createSafeId(text) {
      return "mod-" + normalizeText(text)
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function getSectionLabel(section) {
      if (section === "Futsal - Ensino Medio") return "Futsal - Ensino Médio";
      if (section === "Futsal - Ensino Fundamental") return "Futsal - Ensino Fundamental";
      if (section === "Volei") return "Vôlei";
      return section;
    }

    function getTeamsBySection(teams, section) {
      const sectionNormalized = normalizeText(section);

      return teams.filter(team => {
        const sport = normalizeText(team.sport);
        const category = normalizeText(team.category);

        if (sectionNormalized === "futsal - ensino medio") {
          return (
            sport === "futsal - ensino medio" ||
            sport === "futsal ensino medio" ||
            sport === "futsal medio" ||
            sport === "futsal - medio" ||
            (sport === "futsal" && (
              category === "ensino medio" ||
              category === "medio"
            ))
          );
        }

        if (sectionNormalized === "futsal - ensino fundamental") {
          return (
            sport === "futsal - ensino fundamental" ||
            sport === "futsal ensino fundamental" ||
            sport === "futsal fundamental" ||
            sport === "futsal - fundamental" ||
            (sport === "futsal" && (
              category === "ensino fundamental" ||
              category === "fundamental"
            ))
          );
        }

        if (sectionNormalized === "volei") {
          return sport === "volei";
        }

        return sport === sectionNormalized;
      });
    }

    function buildDisplayName(team) {
      return team.teamName || "Equipe";
    }

    function togglePlayers(panelId, button) {
      const panel = document.getElementById(panelId);
      if (!panel) return;

      panel.classList.toggle("show");
      button.textContent = panel.classList.contains("show") ? "Ocultar jogadores" : "Jogadores";
    }

    window.togglePlayers = togglePlayers;

    function renderPlayersList(players) {
      if (!players || !players.length) {
        return "<p>Nenhum jogador informado.</p>";
      }

      return `
        <ul>
          ${players.map(player => {
            if (player.number) {
              return `<li>${escapeHtml(player.number)} - ${escapeHtml(player.name)}</li>`;
            }

            return `<li>${escapeHtml(player.name)}</li>`;
          }).join("")}
        </ul>
      `;
    }

    function renderTeams(teams) {
      let html = "";

      FIXED_SPORTS.forEach(section => {
        const sectionId = createSafeId(section);
        const sectionLabel = getSectionLabel(section);
        const sectionTeams = getTeamsBySection(teams || [], section);

        html += `
          <div class="teams-group" id="${sectionId}">
            <h2 class="teams-group-title">${escapeHtml(sectionLabel)}</h2>
        `;

        if (!sectionTeams.length) {
          html += `<div class="empty-box">Nenhuma equipe cadastrada em ${escapeHtml(sectionLabel)}.</div>`;
        } else {
          html += `<div class="teams-grid">`;

          sectionTeams.forEach((team, index) => {
            const playersId = `players-panel-${sectionId}-${index}-${team.id || index}`;
            const title = buildDisplayName(team);

            html += `
              <div class="team-box">
                <div class="team-meta">${escapeHtml(sectionLabel)}</div>

                <h3>${escapeHtml(title)}</h3>

                ${normalizeText(section) !== "volei"
                  ? `<p><strong>Capitão:</strong> ${escapeHtml(team.captain || "-")}</p>`
                  : `<p><strong>Equipe de Vôlei</strong></p>`
                }

                <p><strong>Jogadores cadastrados:</strong> ${team.players ? team.players.length : 0}</p>
                <p><strong>Pontos:</strong> ${Number(team.points || 0)}</p>

                <div class="team-actions">
                  <button class="btn-custom players-btn" onclick="togglePlayers('${playersId}', this)">Jogadores</button>
                </div>

                <div class="players-panel" id="${playersId}">
                  ${renderPlayersList(team.players || [])}
                </div>
              </div>
            `;
          });

          html += `</div>`;
        }

        html += `</div>`;
      });

      teamsContainer.innerHTML = html;
    }

    listenTeams((teams) => {
      renderTeams(teams || []);
    });
  </script>

  <script>
    function toggleMobileMenu() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");
      if (!sidebar || !overlay) return;

      sidebar.classList.toggle("mobile-open");
      overlay.classList.toggle("show");
    }

    document.addEventListener("DOMContentLoaded", function () {
      const overlay = document.getElementById("sidebarOverlay");
      const sidebar = document.getElementById("sidebar");

      if (overlay && sidebar) {
        overlay.addEventListener("click", function () {
          sidebar.classList.remove("mobile-open");
          overlay.classList.remove("show");
        });
      }

      document.querySelectorAll(".sidebar .nav-item").forEach(item => {
        item.addEventListener("click", function () {
          if (sidebar && overlay) {
            sidebar.classList.remove("mobile-open");
            overlay.classList.remove("show");
          }
        });
      });

      window.addEventListener("resize", function () {
        if (window.innerWidth > 900 && sidebar && overlay) {
          sidebar.classList.remove("mobile-open");
          overlay.classList.remove("show");
        }
      });
    });
  </script>
</body>
</html>
